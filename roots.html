<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <base href="/python-workshop/">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>知识点索引 - Python入门学习工坊</title>
  <meta name="description" content="浏览所有25个Python核心知识点，支持搜索和分类筛选，快速找到你需要的Python知识点。">
  <meta name="keywords" content="Python,索引,知识点,基础语法,函数,模块,实战案例">
  <meta name="robots" content="index, follow">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐍</text></svg>">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0B1120">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/minimal.css">
</head>
<body>
  <nav class="nav" role="navigation" aria-label="主导航">
    <div class="nav-container">
      <a href="./" class="nav-brand"><span class="brand-icon">🐍</span>Python学习工坊</a>
      <ul class="nav-links">
        <li><a href="learn.html" class="nav-link">学习</a></li>
        <li><a href="flashcard.html" class="nav-link">闪卡</a></li>
        <li><a href="roots.html" class="nav-link active">索引</a></li>
        <li><a href="progress.html" class="nav-link">进度</a></li>
      </ul>
    </div>
  </nav>

  <main class="container-wide" role="main">
    <div class="page-header">
      <h1 class="page-title">知识点索引</h1>
      <p class="page-subtitle">浏览所有25个核心知识点</p>
    </div>

    <div class="search-container">
      <input type="text" class="search-input" id="searchInput" placeholder="搜索知识点..." oninput="searchRoots(this.value)">
    </div>

    <div class="filter-container" id="filterContainer">
      <button class="filter-btn active" onclick="filterByOrigin('all')">全部</button>
    </div>

    <div class="roots-grid" id="rootsGrid"></div>
  </main>

  <footer class="footer" role="contentinfo">
    <div class="footer-tagline">一行代码，开启编程之旅</div>
    <p class="footer-description">浏览所有Python核心知识点</p>
  </footer>

  <script src="js/wordData.js"></script>
  <script src="js/storage.js"></script>
  <script>
    (function() {
      // Build filter buttons from origins
      const origins = [...new Set(WordRoots.map(r => r.origin))];
      const filterContainer = document.getElementById('filterContainer');
      origins.forEach(origin => {
        const btn = document.createElement('button');
        btn.className = 'filter-btn';
        btn.textContent = origin;
        btn.onclick = () => filterByOrigin(origin);
        filterContainer.appendChild(btn);
      });

      function renderRoots(roots) {
        const container = document.getElementById('rootsGrid');
        if (!container) return;

        const progress = StorageManager.getProgress();
        const masteredIds = new Set(progress.masteredRoots);

        container.innerHTML = '';
        roots.forEach(root => {
          const card = createRootCard(root, masteredIds.has(root.id));
          container.appendChild(card);
        });

        if (roots.length === 0) {
          const empty = document.createElement('div');
          empty.className = 'empty-state';
          empty.innerHTML = '<div class="empty-state-icon">🔍</div><div class="empty-state-text">没有找到匹配的知识点</div>';
          container.appendChild(empty);
        }
      }

      function createRootCard(root, isMastered) {
        const card = document.createElement('div');
        card.className = `root-card ${isMastered ? 'mastered' : ''}`;
        card.onclick = () => { window.location.href = `root-detail.html?id=${root.id}`; };

        const nameDiv = document.createElement('div');
        nameDiv.className = 'root-name';
        nameDiv.textContent = root.root;

        const meaningDiv = document.createElement('div');
        meaningDiv.className = 'root-meaning';
        meaningDiv.textContent = root.meaning;

        const originDiv = document.createElement('div');
        originDiv.className = 'root-origin';
        originDiv.textContent = root.origin;

        card.appendChild(nameDiv);
        card.appendChild(meaningDiv);
        card.appendChild(originDiv);

        if (isMastered) {
          const badge = document.createElement('span');
          badge.className = 'mastered-badge';
          badge.textContent = '✓ 已掌握';
          card.appendChild(badge);
        }

        return card;
      }

      window.searchRoots = function(query) {
        if (!query || query.trim() === '') {
          renderRoots(WordRoots);
          return;
        }
        const q = query.toLowerCase();
        const filtered = WordRoots.filter(root =>
          root.root.toLowerCase().includes(q) ||
          root.meaning.toLowerCase().includes(q) ||
          root.origin.toLowerCase().includes(q)
        );
        renderRoots(filtered);
      };

      window.filterByOrigin = function(origin) {
        // Update active state
        document.querySelectorAll('.filter-btn').forEach(btn => {
          btn.classList.toggle('active', btn.textContent === origin || (origin === 'all' && btn.textContent === '全部'));
        });

        if (origin === 'all') {
          renderRoots(WordRoots);
        } else {
          renderRoots(WordRoots.filter(root => root.origin === origin));
        }
      };

      // Init
      renderRoots(WordRoots);
    })();
  </script>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').catch(() => {});
      });
    }
  </script>
</body>
</html>
