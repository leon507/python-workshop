  <script>
    (function() {
      // Hero animation - cycle through first 5 concepts
      const examples = WordRoots.slice(0, 5);
      let currentIndex = 0;

      function updateDemo() {
        const example = examples[currentIndex];
        const wordEl = document.getElementById('demoWord');
        const meaningEl = document.getElementById('demoMeaning');
        const originEl = document.getElementById('demoOrigin');

        if (wordEl) wordEl.textContent = example.root;
        if (meaningEl) meaningEl.textContent = example.meaning;
        if (originEl) originEl.textContent = example.origin;

        currentIndex = (currentIndex + 1) % examples.length;
      }

      updateDemo();
      setInterval(updateDemo, 4000);
    })();
  </script>
